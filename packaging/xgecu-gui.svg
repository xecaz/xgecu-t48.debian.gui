<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Stylised DIP chip: body + pins + pin-1 dot + notch -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c3a4a"/>
      <stop offset="1" stop-color="#1a232e"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f1f24"/>
      <stop offset="1" stop-color="#0e0e14"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="128" height="128" rx="20" fill="url(#bg)"/>

  <!-- Chip body -->
  <rect x="40" y="22" width="48" height="84" rx="6"
        fill="url(#body)" stroke="#3a3a44" stroke-width="1.5"/>

  <!-- Pins, 7 each side -->
  <g fill="#cdd2d8" stroke="#7a7d83" stroke-width="0.8">
    <!-- left side -->
    <rect x="26" y="30" width="14" height="6" rx="1"/>
    <rect x="26" y="42" width="14" height="6" rx="1"/>
    <rect x="26" y="54" width="14" height="6" rx="1"/>
    <rect x="26" y="66" width="14" height="6" rx="1"/>
    <rect x="26" y="78" width="14" height="6" rx="1"/>
    <rect x="26" y="90" width="14" height="6" rx="1"/>
    <!-- right side -->
    <rect x="88" y="30" width="14" height="6" rx="1"/>
    <rect x="88" y="42" width="14" height="6" rx="1"/>
    <rect x="88" y="54" width="14" height="6" rx="1"/>
    <rect x="88" y="66" width="14" height="6" rx="1"/>
    <rect x="88" y="78" width="14" height="6" rx="1"/>
    <rect x="88" y="90" width="14" height="6" rx="1"/>
  </g>

  <!-- Notch at the top -->
  <path d="M 56 22 A 8 8 0 0 0 72 22 Z" fill="url(#bg)"/>

  <!-- Pin-1 dot (yellow) -->
  <circle cx="48" cy="32" r="3.2" fill="#ffd83a"/>

  <!-- "XG" wordmark -->
  <text x="64" y="76" font-family="DejaVu Sans, Verdana, sans-serif"
        font-size="20" font-weight="700" text-anchor="middle"
        fill="#7dd3a0">XG</text>
</svg>
